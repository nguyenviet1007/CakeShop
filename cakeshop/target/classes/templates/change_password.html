<html xmlns:th="http://www.thymeleaf.org">
<div th:replace="~{fragments/account-layout :: accountLayout(~{::content})}">
    <div th:fragment="content">
        <div class="card border-0 shadow-sm p-4 rounded-4">
            <h3 class="mb-4" style="color: #d81b60; font-weight: 600;">Đổi Mật Khẩu</h3>

            <div th:if="${message}" th:class="${'alert alert-' + messageType + ' alert-dismissible fade show'}" role="alert">
                <span th:text="${message}">Thông báo</span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <form th:action="@{/change-password/update}" method="post" id="changePasswordForm">
                <div class="mb-3">
                    <label class="form-label fw-bold text-muted">Mật khẩu hiện tại</label>
                    <input type="password" name="oldPassword" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold text-muted">Mật khẩu mới</label>
                    <input type="password" id="newPassword" name="newPassword" class="form-control" required>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold text-muted">Xác nhận mật khẩu mới</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" class="form-control" required>
                    <div id="passError" class="text-danger small mt-1"></div>
                </div>

                <div class="d-flex justify-content-end">
                    <button class="btn px-5 py-2 fw-bold text-white rounded-pill shadow-sm"
                            style="background-color: #d81b60;"
                            type="submit">
                        <i class="fas fa-shield-alt me-1"></i> Cập Nhật Mật Khẩu
                    </button>
                </div>
            </form>
        </div>

        <script>
            document.getElementById("changePasswordForm").addEventListener("submit", function(e) {
                const newPass = document.getElementById("newPassword").value;
                const confirmPass = document.getElementById("confirmPassword").value;
                const errorDiv = document.getElementById("passError");

                if (newPass !== confirmPass) {
                    e.preventDefault();
                    errorDiv.innerText = "Mật khẩu xác nhận không khớp!";
                    document.getElementById("confirmPassword").classList.add("is-invalid");
                }
            });
        </script>
    </div>
</div>
</html>
