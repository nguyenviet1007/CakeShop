<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nhật Ký Điều Chỉnh Kho</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold"><i class="fa-solid fa-clock-rotate-left me-2 text-primary"></i>Nhật Ký Điều Chỉnh Kho</h4>
        <a href="/manager/daily-stock" class="btn btn-outline-secondary btn-sm">
            <i class="fa-solid fa-arrow-left me-1"></i> Quay lại Tủ Bánh
        </a>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                <tr>
                    <th>Thời gian</th>
                    <th>Tên Bánh</th>
                    <th>Ngày Kho</th>
                    <th class="text-center">Thay đổi</th>
                    <th>Lý do</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="log : ${logs}">
                    <td th:text="${#temporals.format(log.createdAt, 'dd/MM HH:mm')}"></td>
                    <td class="fw-bold text-dark" th:text="${log.dailyStock.product.name}"></td>
                    <td th:text="${log.dailyStock.date}"></td>
                    <td class="text-center">
                        <span th:class="${log.amount > 0 ? 'badge bg-success' : 'badge bg-danger'}"
                              th:text="${log.amount > 0 ? '+' + log.amount : log.amount}">
                        </span>
                    </td>
                    <td th:text="${log.reason}"></td>
                </tr>
                <tr th:if="${#lists.isEmpty(logs)}">
                    <td colspan="6" class="text-center py-4 text-muted">Chưa có nhật ký điều chỉnh nào.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
