<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Bakery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link th:href="@{/css/admin.css}" rel="stylesheet">
</head>
<body>

<div class="wrapper">
    <div th:replace="~{admin/fragments/sidebar-admin :: adminSidebar('dashboard')}"></div>

    <div class="main-content">
        <div class="page-title">Trang quản trị Admin</div>

        <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show shadow-sm" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i> <span th:text="${successMsg}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show shadow-sm" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i> <span th:text="${errorMsg}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="row">
            <div class="col-md-3">
                <div class="stat-card">
                    <p>Người dùng</p>
                    <h3 th:text="${stats != null ? stats.totalUsers : '0'}">0</h3>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <p>Sản phẩm</p>
                    <h3 th:text="${stats != null ? stats.totalProducts : '0'}">0</h3>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <p>Đơn hàng</p>
                    <h3 th:text="${stats != null ? stats.totalOrders : '0'}">0</h3>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <p>Doanh thu</p>
                    <h3 th:text="${stats != null ? #numbers.formatDecimal(stats.totalRevenue, 0, 'COMMA', 0, 'POINT') + 'đ' : '0đ'}">0đ</h3>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-md-6">
                <div class="chart-box bg-white p-3 rounded shadow-sm">
                    <h6 class="fw-bold mb-3 text-secondary" style="font-size: 14px;">Doanh thu 30 ngày gần nhất</h6>
                    <div style="position: relative; height: 300px;">
                        <canvas id="revenueChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="chart-box bg-white p-3 rounded shadow-sm">
                    <h6 class="fw-bold mb-3 text-secondary" style="font-size: 14px;">Tỉ lệ trạng thái đơn hàng</h6>
                    <div style="position: relative; height: 300px;">
                        <canvas id="orderStatusChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <div class="d-flex justify-content-between align-items-center mt-5 mb-3">
            <div style="font-size: 18px; font-weight: 700;">Danh sách người dùng mới nhất</div>
            <button class="btn btn-pink btn-sm px-3" data-bs-toggle="modal" data-bs-target="#addUserModalDash">
                + Thêm mới
            </button>
        </div>

        <div class="table-container">
            <table class="table-custom">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Tên</th>
                    <th>Email</th>
                    <th>Vai trò</th>
                </tr>
                </thead>
                <tr th:each="user : ${users}">
                    <td th:text="${user.id}">1</td>
                    <td th:text="${user.name}"></td>
                    <td th:text="${user.email}"></td>
                    <td th:text="${!user.roles.isEmpty() ? user.roles[0].name : 'Chưa cấp quyền'}"></td>
                </tr>
                <tr th:if="${#lists.isEmpty(users)}">
                    <td colspan="4" class="text-center text-muted py-3">Danh sách trống</td>
                </tr>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="addUserModalDash" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <form th:action="@{/admin/users/add}" method="POST">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold">Thêm Tài Khoản Mới</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Họ tên <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" name="name" required placeholder="Nhập họ và tên">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email (Username) <span class="text-danger">*</span></label>
                        <input type="email" class="form-control" name="email" required placeholder="example@gmail.com">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Phân quyền (Vai trò) <span class="text-danger">*</span></label>
                        <select class="form-select" name="roleIds" required>
                            <option value="">-- Chọn vai trò --</option>
                            <option th:each="role : ${roles}" th:value="${role.id}" th:text="${role.name}"></option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Mật khẩu <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <input type="password" class="form-control" name="password" id="passwordInputDash" required placeholder="Nhập mật khẩu">
                            <button class="btn btn-outline-secondary" type="button" id="togglePasswordBtnDash">
                                <i class="bi bi-eye-slash" id="togglePasswordIconDash"></i>
                            </button>
                        </div>
                    </div>
                </div>
                <div class="modal-footer bg-light">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                    <button type="submit" class="btn btn-pink px-4">Lưu thông tin</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
    document.getElementById('togglePasswordBtnDash').addEventListener('click', function() {
        const passwordInput = document.getElementById('passwordInputDash');
        const icon = document.getElementById('togglePasswordIconDash');

        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            icon.classList.remove('bi-eye-slash');
            icon.classList.add('bi-eye');
        } else {
            passwordInput.type = 'password';
            icon.classList.remove('bi-eye');
            icon.classList.add('bi-eye-slash');
        }
    });
</script>

<script th:inline="javascript">
    // Nhận dữ liệu từ Controller (30 ngày)
    const revenueLabels = /*[[${revenueLabels}]]*/ ['01/03', '02/03', '...'];
    const revenueData = /*[[${revenueData}]]*/ [0, 0, 0];
    const statusData = /*[[${statusData}]]*/ [0, 0, 0, 0];

    // 1. Biểu đồ Doanh thu (Line Chart)
    const revCtx = document.getElementById('revenueChart').getContext('2d');
    new Chart(revCtx, {
        type: 'line',
        data: {
            labels: revenueLabels,
            datasets: [{
                label: 'Doanh thu (VNĐ)',
                data: revenueData,
                borderColor: '#ff6b81',
                backgroundColor: 'rgba(255, 107, 129, 0.1)',
                borderWidth: 2,
                fill: true,
                tension: 0.3,
                // Tự động ẩn điểm tròn nếu quá nhiều ngày (30 ngày) cho đỡ rối
                pointRadius: revenueLabels.length > 15 ? 0 : 4,
                pointHoverRadius: 6,
                pointBackgroundColor: '#fff',
                pointBorderWidth: 2
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false, // Cho phép giãn theo chiều cao của div cha
            layout: {
                padding: { top: 10, bottom: 10, left: 0, right: 10 }
            },
            plugins: {
                legend: { display: false },
                tooltip: {
                    backgroundColor: 'rgba(0, 0, 0, 0.8)',
                    padding: 12,
                    mode: 'index',
                    intersect: false,
                    callbacks: {
                        label: function(context) {
                            return ' Doanh thu: ' + context.parsed.y.toLocaleString('vi-VN') + 'đ';
                        }
                    }
                }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    grid: { color: '#f0f0f0' },
                    ticks: {
                        callback: function(value) {
                            return value.toLocaleString('vi-VN') + 'đ';
                        },
                        font: { size: 11 }
                    }
                },
                x: {
                    grid: { display: false },
                    ticks: {
                        // GIÃN KHOẢNG CÁCH: Chỉ hiện nhãn mỗi 5 ngày một lần cho thoáng
                        callback: function(val, index) {
                            return index % 5 === 0 ? this.getLabelForValue(val) : '';
                        },
                        maxRotation: 0,
                        autoSkip: false,
                        font: { size: 11 }
                    }
                }
            }
        }
    });

    // 2. Biểu đồ Trạng thái (Doughnut Chart)
    const orderCtx = document.getElementById('orderStatusChart').getContext('2d');
    new Chart(orderCtx, {
        type: 'doughnut',
        data: {
            labels: ['Thành công', 'Đang giao', 'Chờ xử lý', 'Đã hủy'],
            datasets: [{
                data: statusData,
                backgroundColor: ['#2ecc71', '#3498db', '#f1c40f', '#e74c3c'],
                borderWidth: 5, // Tăng độ dày viền trắng cho sang
                borderColor: '#fff',
                hoverOffset: 15
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    position: 'bottom',
                    labels: {
                        padding: 25,
                        usePointStyle: true,
                        font: { size: 12, weight: 'bold' }
                    }
                }
            },
            cutout: '75%' // Làm vòng tròn mỏng đi nhìn sẽ hiện đại hơn
        }
    });
</script>
</body>
</html>
