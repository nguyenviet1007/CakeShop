<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đổi mật khẩu</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
        body{background:linear-gradient(135deg,#eef2ff,#f8fafc);}

        .box{
            width:420px;
            margin:90px auto;
            background:white;
            padding:35px 30px;
            border-radius:18px;
            box-shadow:0 15px 35px rgba(0,0,0,0.08);
            transition:0.3s;
        }
        .box:hover{transform:translateY(-4px);}

        h2{
            text-align:center;
            margin-bottom:25px;
            color:#111827;
        }

        /* ALERT */
        .alert{
            padding:10px;
            border-radius:10px;
            margin-bottom:15px;
            font-size:14px;
        }

        .error{
            background:#fee2e2;
            color:#dc2626;
        }

        .success{
            background:#dcfce7;
            color:#16a34a;
        }

        /* INPUT */
        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border-radius:10px;
            border:1px solid #e5e7eb;
            outline:none;
            transition:0.3s;
        }

        input:focus{
            border-color:#6366f1;
            box-shadow:0 0 0 2px rgba(99,102,241,0.2);
        }

        /* BUTTON */
        button{
            width:100%;
            padding:12px;
            border-radius:10px;
            border:none;
            background:linear-gradient(135deg,#22c55e,#16a34a);
            color:white;
            font-weight:500;
            cursor:pointer;
            margin-top:10px;
            transition:0.3s;
        }

        button:hover{opacity:0.9;}

        /* BACK */
        .back{
            display:block;
            text-align:center;
            margin-top:18px;
            text-decoration:none;
            color:#6b7280;
            font-size:14px;
        }

        .back:hover{color:#4f46e5;}

    </style>
</head>

<body>

<div class="box">

    <h2>🔐 Đổi mật khẩu</h2>

    <div th:if="${error}" class="alert error">
        <span th:text="${error}"></span>
    </div>

    <div th:if="${success}" class="alert success">
        <span th:text="${success}"></span>
    </div>

    <form th:action="@{/shipper/change-password}" method="post">

        <input type="password" name="oldPassword" placeholder="Mật khẩu cũ" required>

        <input type="password" name="newPassword" placeholder="Mật khẩu mới" required>

        <input type="password" name="confirmPassword" placeholder="Nhập lại mật khẩu mới" required>

        <button type="submit">🔄 Đổi mật khẩu</button>

    </form>

    <a th:href="@{/shipper/profile}" class="back">⬅ Quay lại Profile</a>

</div>

</body>
</html>
