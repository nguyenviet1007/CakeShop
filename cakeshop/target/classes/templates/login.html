<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - ALI Bakery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .login-container {
            max-width: 400px; margin: 100px auto;
            background: white; padding: 30px;
            border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .btn-black { background: black; color: white; border-radius: 8px; padding: 12px; }
        .btn-black:hover { background: #333; color: white; }
        .form-control { padding: 12px; border-radius: 8px; margin-bottom: 15px; }
    </style>
</head>
<body>
<div class="login-container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">Login / Sign Up!</h2>
        <a th:href="@{/}" class="btn-close"></a>
    </div>
    <p class="text-muted small">Please enter your mobile number</p>

    <form th:action="@{/login}" method="post">
        <div th:if="${error}" class="alert alert-danger small" th:text="${error}"></div>

        <input type="text" name="phoneNumber" class="form-control" placeholder="10 digit mobile number" required>
        <input type="password" name="password" class="form-control" placeholder="Password" required>

        <div class="text-end mb-3">
            <a href="#" class="text-dark small text-decoration-none fw-bold">With Email</a>
        </div>

        <button type="submit" class="btn btn-black w-100 mb-3">Login &nbsp; →</button>

        <div class="mt-3">
            <a th:href="@{/oauth2/authorization/google}" class="btn btn-outline-dark w-100 rounded-pill">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="20" class="me-2">
                Continue with Google
            </a>
        </div>

        <p class="text-center x-small text-muted" style="font-size: 11px;">
            By continuing I agree to ALI Bakery's <b>Terms & Conditions</b> and <b>Privacy Policy</b>
        </p>
    </form>
</div>
</body>
</html>
