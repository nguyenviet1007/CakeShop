<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }
        .server-message{
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 25px;
            border-radius: 10px;
            font-weight: 500;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            z-index: 999;
            animation: slideDown 0.5s ease;
        }

        .forgot-password{
            text-align:right;
            margin-top:5px;
        }

        .forgot-password a{
            color:white;
            font-size:13px;
            text-decoration:underline;
            transition:0.3s;
        }

        .forgot-password a:hover{
            color:#ddd;
        }

        .server-success{
            background: #4CAF50;
            color: white;
        }

        @keyframes slideDown{
            from{
                opacity: 0;
                transform: translate(-50%, -20px);
            }
            to{
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }
        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#667eea,#764ba2);
        }

        .login-container{
            background:rgba(255,255,255,0.15);
            backdrop-filter:blur(15px);
            padding:40px;
            border-radius:15px;
            width:350px;
            color:white;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
            text-align:center;
        }

        h2{
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:none;
            border-radius:8px;
            outline:none;
        }

        input:focus{
            box-shadow:0 0 5px #fff;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#ffffff;
            color:#764ba2;
            font-weight:600;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#f1f1f1;
            transform:scale(1.03);
        }

        hr{
            margin:25px 0;
            border:0.5px solid rgba(255,255,255,0.4);
        }

        .server-error{
            background: #ef4444;
            color: white;
        }
        .google-btn{
            display:flex;
            align-items:center;
            justify-content:center;
            gap:10px;
            text-decoration:none;
            background:white;
            color:#444;
            padding:12px;
            border-radius:8px;
            font-weight:500;
            transition:0.3s;
        }

        .google-btn:hover{
            transform:scale(1.05);
            background:#f5f5f5;
        }

        .google-btn img{
            width:20px;
        }
        .register-btn{
            display:block;
            margin-top:10px;
            text-decoration:none;
            padding:12px;
            border-radius:8px;
            background:transparent;
            border:2px solid white;
            color:white;
            font-weight:500;
            transition:0.3s;
        }

        .register-btn:hover{
            background:white;
            color:#764ba2;
        }

        @media(max-width:400px){
            .login-container{
                width:90%;
            }
        }
    </style>
</head>

<body>
<div th:if="${param.registerSuccess}" class="server-message server-success">
    Đăng ký thành công, hãy đăng nhập.
</div>
<!-- SUCCESS -->
<div th:if="${param.success}" class="server-message server-success">
    ✅ Đổi mật khẩu thành công! Hãy đăng nhập lại.
</div>

<!-- ERROR -->
<div th:if="${param.error}" class="server-message server-error">
    Username hoặc password không đúng
</div>

<!-- TOKEN INVALID -->
<div th:if="${param.invalid}" class="server-message server-error">
    ⚠️ Link không hợp lệ hoặc đã hết hạn!
</div>

<div th:if="${param.disabled}" class="alert alert-warning">
    🔒 Tài khoản của bạn đã bị khóa!
</div>
<div class="login-container">

    <h2>Welcome Back 👋</h2>

    <form th:action="@{/login}" method="post">

        <input type="text" name="username" placeholder="Username" required>

        <input type="password" name="password" placeholder="Password" required>

        <div class="forgot-password">
            <a th:href="@{/forgot-password}">Quên mật khẩu?</a>
        </div>

        <button type="submit">Login</button>

    </form>

    <br>

    <a th:href="@{/register}" class="register-btn">
        Create new account
    </a>


    <hr>

    <h3>Or continue with</h3>

    <br>

    <a href="/oauth2/authorization/google" class="google-btn">
        <img src="https://developers.google.com/identity/images/g-logo.png">
        Login with Google
    </a>

</div>

</body>
</html>
