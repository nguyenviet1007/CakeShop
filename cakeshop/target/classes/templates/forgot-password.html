<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quên mật khẩu</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            background:linear-gradient(135deg,#eef2ff,#f8fafc);
        }

        /* CARD */
        .container{
            width:420px;
            margin:100px auto;
            background:white;
            padding:35px 30px;
            border-radius:18px;
            box-shadow:0 15px 35px rgba(0,0,0,0.08);
            text-align:center;
            transition:0.3s;
        }

        .container:hover{
            transform:translateY(-4px);
        }

        h2{
            margin-bottom:10px;
            color:#111827;
        }

        .sub{
            font-size:14px;
            color:#6b7280;
            margin-bottom:20px;
        }

        /* INPUT */
        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border-radius:10px;
            border:1px solid #e5e7eb;
            outline:none;
            transition:0.3s;
        }

        input:focus{
            border-color:#6366f1;
            box-shadow:0 0 0 2px rgba(99,102,241,0.2);
        }

        /* BUTTON */
        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:10px;
            background:linear-gradient(135deg,#4f46e5,#6366f1);
            color:white;
            font-weight:500;
            cursor:pointer;
            margin-top:10px;
        }

        button:hover{
            opacity:0.9;
        }

        /* ALERT */
        .alert{
            padding:10px;
            border-radius:10px;
            margin-bottom:12px;
            font-size:14px;
        }

        .success{
            background:#dcfce7;
            color:#16a34a;
        }

        .error{
            background:#fee2e2;
            color:#dc2626;
        }

        /* BACK */
        .back{
            display:block;
            margin-top:15px;
            font-size:14px;
            text-decoration:none;
            color:#6b7280;
        }

        .back:hover{
            color:#4f46e5;
        }

    </style>
</head>

<body>

<div class="container">

    <h2>🔑 Quên mật khẩu</h2>
    <div class="sub">Nhập thông tin để nhận link đặt lại mật khẩu</div>

    <!-- ALERT -->
    <div th:if="${param.success}" class="alert success">
        ✅ Đã gửi email! Vui lòng kiểm tra hộp thư
    </div>

    <div th:if="${param.error}" class="alert error">
        ❌ Thông tin không chính xác!
    </div>

    <form th:action="@{/forgot-password}" method="post">

        <input type="text"
               name="username"
               placeholder="Username"
               required>

        <input type="email"
               name="email"
               placeholder="Email"
               required>

        <button type="submit">
            📩 Gửi link reset
        </button>

    </form>

    <a href="/login" class="back">⬅ Quay lại đăng nhập</a>

</div>

</body>
</html>
