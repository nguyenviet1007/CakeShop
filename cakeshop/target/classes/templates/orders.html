<html xmlns:th="http://www.thymeleaf.org">
<div th:replace="fragments/account-layout :: accountLayout(~{::content})">
    <div th:fragment="content">
        <h2>Đơn Mua</h2>
        <div class="order-list">
            <div class="order-card" th:each="order : ${orders}">
                <div class="order-header">
                    Order ID: <span th:text="${order.id}"></span>
                </div>
                <div class="order-body">
                    <div>
                        Tổng tiền:
                        <b th:text="${order.totalAmount}"></b>
                    </div>
                    <div>
                        Trạng thái:
                        <span class="status"
                              th:text="${order.status}">
            </span>
                    </div>
                </div>
                <div class="order-footer">
                    <a th:href="@{/account/orders/{id}(id=${order.id})}">
                        Track Order
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
</html>
