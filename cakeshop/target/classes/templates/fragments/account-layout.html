<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<div th:fragment="accountLayout(content)">
<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/detail_css.css}">
    <link rel="stylesheet" th:href="@{/css/account.css}">
</head>
<body>
<header class="bg-white shadow-sm">
    <div class="container py-3 d-flex justify-content-between align-items-center">
        <div class="logo">🍰 ALI Bakery</div>
        <a th:href="@{/}" class="btn btn-outline-secondary rounded-pill">
            ← Home
        </a>
    </div>
</header>
<div class="container my-5">
    <div class="row">
        <div class="col-md-3">
            <div class="list-group account-menu">
                <a th:href="@{/account/profile}" class="list-group-item list-group-item-action active">
                    👤 Hồ sơ
                </a>
                <a th:href="@{/account/orders}" class="list-group-item list-group-item-action">
                    📦 Đơn mua
                </a>
            </div>
        </div>
        <div class="col-md-9">
            <div th:replace="${content}"></div>
        </div>
    </div>
</div>
</body>
</html>
