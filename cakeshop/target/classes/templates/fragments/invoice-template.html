<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<div th:fragment="invoiceContent" class="invoice-container p-3" id="printableInvoice">
    <div class="text-center mb-4">
        <h3 class="fw-bold mb-0">TIỆM BÁNH BAKERY</h3>
        <p class="text-muted small">Địa chỉ: 123 Đường ABC, Hà Nội<br>SĐT: 0123.456.789</p>
        <hr style="border-top: 2px dashed #000;">
        <h5 class="fw-bold text-uppercase">Hóa Đơn Bán Lẻ</h5>
        <th:block th:if="${order != null}">
            <p class="mb-0">Mã đơn: <span class="fw-bold" th:text="'#ORD-' + ${order.id}"></span></p>
            <p class="small" th:text="${#temporals.format(order.orderDate, 'dd/MM/yyyy HH:mm')}"></p>
        </th:block>
    </div>

    <div class="mb-3 small" th:if="${order != null}">
        <p class="mb-1"><b>Khách hàng:</b> <span th:text="${order.user != null ? order.user.name : 'Khách vãng lai'}"></span></p>
        <p class="mb-1"><b>Hình thức:</b> <span th:text="${order.payment == 'CASH' ? 'Tiền mặt' : 'Chuyển khoản'}"></span></p>
    </div>

    <table class="table table-sm table-borderless small" th:if="${order != null}">
        <thead style="border-bottom: 1px solid #000;">
        <tr>
            <th>Sản phẩm</th>
            <th class="text-center">SL</th>
            <th class="text-end">T.Tiền</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="detail : ${order.orderDetails}">
            <td th:text="${detail.product.name}">Tên bánh</td>
            <td class="text-center" th:text="${detail.quantity}">0</td>
            <td class="text-end" th:text="${#numbers.formatDecimal(detail.price * detail.quantity, 0, 'COMMA', 0, 'POINT')} + 'đ'">0đ</td>
        </tr>
        </tbody>
    </table>

    <hr style="border-top: 1px dashed #000;">

    <div class="d-flex justify-content-between fw-bold fs-5" th:if="${order != null}">
        <span>TỔNG CỘNG:</span>
        <span class="text-danger" th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')} + 'đ'"></span>
    </div>

    <div class="text-center mt-4 small">
        <p>Cảm ơn Quý khách - Hẹn gặp lại!</p>
        <p class="fst-italic">Lưu ý: Hóa đơn chỉ có giá trị trong ngày</p>
    </div>
</div>
</html>
