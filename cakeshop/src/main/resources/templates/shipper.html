<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Shipper Dashboard</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
        body{background:linear-gradient(135deg,#eef2ff,#f8fafc);}

        .header{
            background:rgba(255,255,255,0.8);
            backdrop-filter:blur(12px);
            padding:15px 40px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .logo{font-weight:600;font-size:20px;color:#4f46e5;}

        .menu a{
            text-decoration:none;
            margin:0 12px;
            color:#374151;
        }

        .logout{color:red;}

        .container{width:92%;margin:30px auto;}

        h2{margin-bottom:10px;}

        .card{
            background:white;
            border-radius:16px;
            padding:20px;
            margin-bottom:30px;
            box-shadow:0 10px 25px rgba(0,0,0,0.08);
        }

        table{width:100%;border-collapse:collapse;}

        th{
            padding:12px;
            background:#4f46e5;
            color:white;
        }

        td{
            padding:12px;
            border-bottom:1px solid #eee;
        }

        .money{
            font-weight:600;
            color:#16a34a;
        }

        .btn{
            padding:6px 12px;
            background:#4f46e5;
            color:white;
            border-radius:6px;
            text-decoration:none;
        }

        .pagination{
            margin-top:15px;
            display:flex;
            justify-content:center;
        }

        .page-link{
            padding:6px 10px;
            margin:0 3px;
            border:1px solid #ddd;
            text-decoration:none;
            color:#333;
        }

        .active{
            background:#4f46e5;
            color:white;
        }

        .filter-box{
            margin-bottom:10px;
        }
    </style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="logo">🚚 Shipper System</div>

    <div class="menu">
        <a th:href="@{/shipper}">Dashboard</a>
        <a th:href="@{/shipper/history}">Lịch sử</a>
        <a th:href="@{/shipper/profile}">Profile</a>
    </div>

    <div sec:authorize="isAuthenticated()">
        👋 <b sec:authentication="name"></b>
        <a th:href="@{/do-logout}" class="logout">Logout</a>
    </div>
</div>

<div class="container">

    <!-- ================= ASSIGNED ================= -->
    <h2>📦 Đơn được phân công</h2>

    <div class="card">

        <form method="get" th:action="@{/shipper}" class="filter-box">
            <input type="text" name="keywordAssigned"
                   th:value="${keywordAssigned}"
                   placeholder="🔍 Tìm đơn...">
            <button type="submit">Tìm</button>
        </form>

        <table>
            <tr>
                <th>ID</th>
                <th>Khách</th>
                <th>Địa chỉ</th>
                <th>Tổng</th>
                <th></th>
            </tr>

            <tr th:each="o : ${assignedPage.content}">
                <td th:text="${o.id}"></td>
                <td th:text="${o.user.name}"></td>
                <td th:text="${o.deliveryAddress}"></td>

                <!-- 💰 FORMAT TIỀN -->
                <td>
                    <span class="money"
                          th:text="${#numbers.formatDecimal((o.totalAmount ?: 0), 0, 'COMMA', 0, 'POINT')} + ' đ'">
                    </span>
                </td>

                <td>
                    <a class="btn"
                       th:href="@{/shipper/order/{id}(id=${o.id})}">
                        Chi tiết
                    </a>
                </td>
            </tr>
        </table>

        <div class="pagination">
            <a class="page-link"
               th:if="${assignedPage.number > 0}"
               th:href="@{/shipper(pageAssigned=${assignedPage.number - 1}, keywordAssigned=${keywordAssigned})}">
                Prev
            </a>

            <span th:each="i : ${#numbers.sequence(0, assignedPage.totalPages - 1)}">
                <a class="page-link"
                   th:classappend="${i == assignedPage.number} ? 'active'"
                   th:href="@{/shipper(pageAssigned=${i}, keywordAssigned=${keywordAssigned})}"
                   th:text="${i+1}">
                </a>
            </span>

            <a class="page-link"
               th:if="${assignedPage.number < assignedPage.totalPages - 1}"
               th:href="@{/shipper(pageAssigned=${assignedPage.number + 1}, keywordAssigned=${keywordAssigned})}">
                Next
            </a>
        </div>

    </div>


    <!-- ================= SHIPPING ================= -->
    <h2>🚚 Đơn đang giao</h2>

    <div class="card">

        <form method="get" th:action="@{/shipper}" class="filter-box">
            <input type="text" name="keywordShipping"
                   th:value="${keywordShipping}"
                   placeholder="🔍 Tìm đơn đang giao...">
            <button type="submit">Tìm</button>
        </form>

        <table>
            <tr>
                <th>ID</th>
                <th>Khách</th>
                <th>Địa chỉ</th>
                <th>Tổng</th>
                <th></th>
            </tr>

            <tr th:each="o : ${shippingPage.content}">
                <td th:text="${o.id}"></td>
                <td th:text="${o.user.name}"></td>
                <td th:text="${o.deliveryAddress}"></td>

                <!-- 💰 FORMAT TIỀN -->
                <td>
                    <span class="money"
                          th:text="${#numbers.formatDecimal((o.totalAmount ?: 0), 0, 'COMMA', 0, 'POINT')} + ' đ'">
                    </span>
                </td>

                <td>
                    <a class="btn"
                       th:href="@{/shipper/order/{id}(id=${o.id})}">
                        Theo dõi
                    </a>
                </td>
            </tr>
        </table>

        <div class="pagination">
            <a class="page-link"
               th:if="${shippingPage.number > 0}"
               th:href="@{/shipper(pageShipping=${shippingPage.number - 1}, keywordShipping=${keywordShipping})}">
                Prev
            </a>

            <span th:each="i : ${#numbers.sequence(0, shippingPage.totalPages - 1)}">
                <a class="page-link"
                   th:classappend="${i == shippingPage.number} ? 'active'"
                   th:href="@{/shipper(pageShipping=${i}, keywordShipping=${keywordShipping})}"
                   th:text="${i+1}">
                </a>
            </span>

            <a class="page-link"
               th:if="${shippingPage.number < shippingPage.totalPages - 1}"
               th:href="@{/shipper(pageShipping=${shippingPage.number + 1}, keywordShipping=${keywordShipping})}">
                Next
            </a>
        </div>

    </div>

</div>

</body>
</html>
