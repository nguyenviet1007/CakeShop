<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${blog.title} + ' - ALI Bakery'">Chi tiết bài viết</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .blog-container { max-width: 900px; margin: 0 auto; background: #fff; padding: 40px; border-radius: 8px; }
        .blog-meta { color: #888; font-size: 0.9rem; margin-bottom: 20px; }
        .blog-content { line-height: 1.8; color: #333; font-size: 1.1rem; text-align: justify; }
        .blog-content img { max-width: 100%; height: auto; border-radius: 8px; margin: 20px 0; }
        .blog-main-image { width: 100%; max-height: 500px; object-fit: cover; border-radius: 8px; margin-bottom: 30px; }
        .breadcrumb-item a { color: #ff69b4; text-decoration: none; }
    </style>
</head>
<body>

<header th:replace="~{Home :: header}"></header>

<main class="container my-5">

    <article class="blog-container shadow-sm">
        <img th:src="@{/uploads/{file}(file=${blog.image})}"
             class="blog-main-image shadow-sm"
             th:alt="${blog.title}">

        <h1 class="fw-bold mb-3" th:text="${blog.title}" style="color: #2c3e50;">Tiêu đề bài viết</h1>

        <div class="blog-meta">
            <i class="far fa-calendar-alt me-1"></i>
            <span th:text="${#temporals.format(blog.createdAt, 'dd/MM/yyyy')}">18/03/2026</span>
            <span class="mx-2">|</span>
            <i class="far fa-user me-1"></i> by <strong>Monginis</strong>
        </div>

        <hr class="my-4" style="border-top: 2px solid #f8f9fa;">

        <div class="blog-content">
            <p class="fw-bold fs-5 text-secondary mb-4" th:text="${blog.summary}">Tóm tắt nội dung...</p>

            <div th:utext="${blog.content}">
                Nội dung bài viết sẽ hiển thị ở đây...
            </div>
        </div>

        <div class="mt-5 pt-4 border-top">
            <a th:href="@{/}" class="btn btn-outline-pink rounded-pill px-4">
                <i class="fas fa-arrow-left me-2"></i> Quay lại trang chủ
            </a>
        </div>
    </article>
</main>

<footer th:replace="~{Home :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
