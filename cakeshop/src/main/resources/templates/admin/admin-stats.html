<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thống kê - Admin</title>
    <link th:href="@{/css/admin.css}" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="wrapper">
    <div th:replace="~{admin/fragments/sidebar-admin :: adminSidebar('stats')}"></div>

    <div class="main-content">
        <div class="page-title">Thống kê</div>

        <div class="control-bar mb-4">
            <select class="form-control-custom">
                <option>Hôm nay</option>
                <option>Tuần này</option>
                <option>Tháng này</option>
            </select>
        </div>

        <div class="row">
            <div class="col-md-3">
                <div class="stat-card">
                    <p>Tổng số đơn hàng</p>
                    <h3 th:text="${stats != null ? stats.totalOrders : '0'}">0</h3>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <p>Tổng doanh thu</p>
                    <h3 th:text="${stats != null ? #numbers.formatDecimal(stats.totalRevenue, 0, 'COMMA', 0, 'POINT') + 'đ' : '0đ'}">
                        0đ</h3>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <p>Sản phẩm bán chạy</p>
                    <h3 th:text="${stats != null ? stats.totalProducts : '0'}">0</h3>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <p>Người dùng hệ thống</p>
                    <h3 th:text="${stats != null ? stats.totalUsers : '0'}">0</h3>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-md-6">
                <div class="chart-box bg-white p-3 rounded shadow-sm">
                    <h6 class="fw-bold mb-3 text-secondary" style="font-size: 14px;">Doanh thu 7 ngày gần nhất</h6>
                    <div style="position: relative; height: 300px;">
                        <canvas id="revenueChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="chart-box bg-white p-3 rounded shadow-sm">
                    <h6 class="fw-bold mb-3 text-secondary" style="font-size: 14px;">Tỉ lệ trạng thái đơn hàng</h6>
                    <div style="position: relative; height: 300px;">
                        <canvas id="orderStatusChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
    // 1. Biểu đồ Doanh thu (Line Chart)
    const revCtx = document.getElementById('revenueChart').getContext('2d');
    new Chart(revCtx, {
        type: 'line',
        data: {
            labels: ['Thứ 2', 'Thứ 3', 'Thứ 4', 'Thứ 5', 'Thứ 6', 'Thứ 7', 'CN'],
            datasets: [{
                label: 'Doanh thu (VNĐ)',
                data: [1500000, 2300000, 1800000, 3200000, 2800000, 4500000, 5200000], // Dữ liệu mẫu chơi chơi
                borderColor: '#ff6b81', // Màu hồng cho tone sur tone
                backgroundColor: 'rgba(255, 107, 129, 0.2)',
                borderWidth: 3,
                fill: true,
                tension: 0.4, // Làm cho đường cong mềm mại
                pointBackgroundColor: '#fff',
                pointBorderColor: '#ff6b81',
                pointBorderWidth: 2,
                pointRadius: 4
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {display: false}
            },
            scales: {
                y: {beginAtZero: true}
            }
        }
    });

    // 2. Biểu đồ Trạng thái đơn hàng (Doughnut Chart)
    const orderCtx = document.getElementById('orderStatusChart').getContext('2d');
    new Chart(orderCtx, {
        type: 'doughnut',
        data: {
            labels: ['Thành công', 'Đang giao', 'Chờ xử lý', 'Đã hủy'],
            datasets: [{
                data: [65, 15, 10, 10], // Dữ liệu mẫu %
                backgroundColor: [
                    '#2ecc71', // Xanh lá
                    '#3498db', // Xanh dương
                    '#f1c40f', // Vàng
                    '#e74c3c'  // Đỏ
                ],
                borderWidth: 2,
                borderColor: '#fff',
                hoverOffset: 8
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    position: 'bottom',
                    labels: {padding: 20, usePointStyle: true}
                }
            },
            cutout: '70%' // Độ rỗng ở giữa
        }
    });
</script>
</body>
</html>
