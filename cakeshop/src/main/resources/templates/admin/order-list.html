<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Đơn Hàng - Bakery Admin</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body { background-color: #f8f9fa; font-family: 'Nunito', 'Segoe UI', sans-serif; }
        .glass-toolbar { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid #e9ecef; position: sticky; top: 0; z-index: 1000; padding: 15px 20px; }
        .btn-back { color: #495057; font-size: 1.2rem; margin-right: 15px; transition: 0.2s; }
        /* Tab trạng thái */
        .nav-pills .nav-link { color: #6c757d; font-weight: 600; border-radius: 20px; padding: 8px 20px; margin-right: 10px; border: 1px solid #dee2e6; cursor: pointer; transition: 0.2s; }
        .nav-pills .nav-link.active { background-color: #0dcaf0; color: white; border-color: #0dcaf0; }

        .order-card { background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: none; overflow: hidden; }
        .table > :not(caption) > * > * { padding: 15px 20px; vertical-align: middle; }
        .order-id { font-weight: 800; color: #495057; }
        .total-amount { font-weight: bold; color: #dc3545; font-size: 1.1rem; }
        .badge-status { padding: 6px 12px; border-radius: 20px; font-weight: 600; font-size: 0.85rem; }
        .bg-pending { background-color: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
        .bg-completed { background-color: #d1e7dd; color: #0f5132; border: 1px solid #badbcc; }
        .bg-cancelled { background-color: #f8d7da; color: #842029; border: 1px solid #f5c2c7; }
        .btn-action { width: 32px; height: 32px; padding: 0; display: inline-flex; align-items: center; justify-content: center; border-radius: 8px; margin-right: 5px; }

        @media print {
            body * { visibility: hidden; }
            #modalContainer, #modalContainer * { visibility: visible; }
            #modalContainer { position: absolute; left: 0; top: 0; width: 100%; }
            .modal-footer, .btn-close { display: none !important; }
        }
    </style>
</head>
<body>

<div class="glass-toolbar d-flex justify-content-between align-items-center shadow-sm">
    <div class="d-flex align-items-center">
        <a href="/admin/products" class="btn-back" title="Quay lại"><i class="fa-solid fa-arrow-left"></i></a>
        <h4 class="mb-0 fw-bold text-dark"><i class="fa-solid fa-clipboard-list text-info me-2"></i>Quản Lý Đơn Hàng</h4>
    </div>
</div>

<div class="container-fluid p-4">

    <div class="card mb-4 border-0 shadow-sm rounded-4">
        <div class="card-body">
            <div class="row g-3 align-items-end">
                <div class="col-12 mb-2">
                    <ul class="nav nav-pills" id="statusTabs">
                        <li class="nav-item"><button class="nav-link active" data-filter="">Tất cả trạng thái</button></li>
                        <li class="nav-item"><button class="nav-link" data-filter="PENDING">Chờ xử lý</button></li>
                        <li class="nav-item"><button class="nav-link" data-filter="SHIPPING">Đang giao</button></li>
                        <li class="nav-item"><button class="nav-link" data-filter="COMPLETED">Hoàn thành</button></li>
                        <li class="nav-item"><button class="nav-link" data-filter="CANCELLED">Đã hủy</button></li>
                    </ul>
                </div>

                <div class="col-md-2">
                    <label class="form-label small fw-bold">Ngày giao dịch:</label>
                    <input type="date" id="statsDate" class="form-control" onchange="getRevenueStats()">
                </div>

                <div class="col-md-2">
                    <label class="form-label small fw-bold">Phương thức:</label>
                    <select id="statsMethod" class="form-select" onchange="getRevenueStats()">
                        <option value="">Tất cả thanh toán</option>
                        <option value="CASH">Tiền mặt</option>
                        <option value="TRANSFER">Chuyển khoản</option>
                    </select>
                </div>

                <div class="col-md-2">
                    <label class="form-label small fw-bold">Kênh bán:</label>
                    <select id="statsChannel" class="form-select" onchange="getRevenueStats()">
                        <option value="">Tất cả kênh</option>
                        <option value="POS">Tại quầy (POS)</option>
                        <option value="ONLINE">Online</option>
                    </select>
                </div>

                <div class="col-md-3">
                    <label class="form-label small fw-bold">Tìm kiếm nhanh:</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white"><i class="fa-solid fa-magnifying-glass text-muted"></i></span>
                        <input type="text" id="searchFilter" class="form-control" placeholder="Mã đơn, tên khách..." oninput="getRevenueStats()">
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="p-2 border rounded-3 bg-light d-flex justify-content-around text-center shadow-sm">
                        <div>
                            <div class="small text-muted">Số đơn</div>
                            <div class="fw-bold text-dark fs-5" id="resCount">0</div>
                        </div>
                        <div class="border-start"></div>
                        <div>
                            <div class="small text-muted">Doanh thu</div>
                            <div class="fw-bold text-danger fs-5" id="resTotal">0đ</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="tableWrapper">
        <div th:fragment="orderTableFragment">
            <input type="hidden" id="hiddenTotal" th:value="${statTotal}">
            <input type="hidden" id="hiddenCount" th:value="${statCount}">

            <div class="order-card shadow-sm border-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                        <tr>
                            <th>Mã Đơn</th>
                            <th>Ngày Đặt</th>
                            <th>Khách Hàng</th>
                            <th>Kênh Bán</th>
                            <th>Tổng Tiền</th>
                            <th>Trạng Thái</th>
                            <th class="text-center">Thao Tác</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="order : ${orders}" class="order-row">
                            <td class="order-id" th:text="'#ORD-' + ${order.id}"></td>
                            <td>
                                <div th:text="${#temporals.format(order.orderDate, 'dd/MM/yyyy')}"></div>
                                <small class="text-muted" th:text="${#temporals.format(order.orderDate, 'HH:mm')}"></small>
                            </td>
                            <td>
                                <p class="customer-name mb-0 fw-bold" th:text="${order.user != null ? order.user.name : 'Khách Lẻ'}"></p>
                            </td>
                            <td>
                <span th:class="${order.user != null ? 'badge bg-light text-success border border-success' : 'badge bg-light text-primary border border-primary'}">
                  <i th:class="${order.user != null ? 'fa-solid fa-globe me-1' : 'fa-solid fa-store me-1'}"></i>
                  <span th:text="${order.user != null ? 'Online' : 'Tại quầy'}"></span>
                </span>
                            </td>
                            <td class="total-amount" th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')} + 'đ'"></td>
                            <td>
                                <span th:if="${order.status == 'PENDING'}" class="badge-status bg-pending">Chờ xử lý</span>
                                <span th:if="${order.status == 'SHIPPING'}" class="badge-status bg-info text-white">Đang giao</span>
                                <span th:if="${order.status == 'COMPLETED'}" class="badge-status bg-completed">Hoàn thành</span>
                                <span th:if="${order.status == 'CANCELLED'}" class="badge-status bg-cancelled">Đã hủy</span>
                            </td>
                            <td class="text-center">
                                <button class="btn btn-info text-white btn-action" th:onclick="|openDetailModal(${order.id})|"><i class="fa-solid fa-eye"></i></button>
                                <th:block th:if="${order.status == 'PENDING'}">
                                    <button class="btn btn-primary btn-action" th:onclick="|changeStatus(${order.id}, 'SHIPPING')|"><i class="fa-solid fa-truck"></i></button>
                                </th:block>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(orders)}">
                            <td colspan="7" class="text-center py-5 text-muted">Không tìm thấy đơn hàng nào.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="orderDetailModal" tabindex="-1">
    <div class="modal-dialog modal-md modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            <div class="modal-header bg-light">
                <h5 class="modal-title fw-bold">Chi Tiết Hóa Đơn</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="modalContainer"></div>
            <div class="modal-footer bg-light">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                <button type="button" class="btn btn-primary" onclick="window.print()"><i class="fa-solid fa-print me-1"></i> In Ngay</button>
            </div>
        </div>
    </div>
</div>

<script>
    let currentStatus = '';

    // Xử lý click Tab trạng thái
    document.querySelectorAll('#statusTabs .nav-link').forEach(tab => {
      tab.addEventListener('click', function() {
        document.querySelectorAll('#statusTabs .nav-link').forEach(t => t.classList.remove('active'));
        this.classList.add('active');
        currentStatus = this.getAttribute('data-filter');
        getRevenueStats(); // Gọi lọc lại khi đổi tab
      });
    });

    // Hàm Lọc Tổng Hợp (Gộp Ngày, Phương thức, Kênh, Tìm kiếm, Trạng thái)
    function getRevenueStats() {
      const date = document.getElementById('statsDate').value; // Nếu trống sẽ là chuỗi rỗng
      const method = document.getElementById('statsMethod').value;
      const channel = document.getElementById('statsChannel').value;
      const search = document.getElementById('searchFilter').value;

      const wrapper = document.getElementById('tableWrapper');
      wrapper.style.opacity = '0.5';

      // Xây dựng URL động
      let url = `/admin/orders/statistics?date=${date}&method=${method}&channel=${channel}&search=${search}&status=${currentStatus}`;

      fetch(url)
          .then(res => res.text())
          .then(html => {
              wrapper.innerHTML = html;
              wrapper.style.opacity = '1';

              const total = document.getElementById('hiddenTotal').value || 0;
              const count = document.getElementById('hiddenCount').value || 0;

              document.getElementById('resTotal').innerText = new Intl.NumberFormat('vi-VN', {
                  style: 'currency', currency: 'VND'
              }).format(total);
              document.getElementById('resCount').innerText = count;
          })
          .catch(err => {
              wrapper.style.opacity = '1';
              console.error(err);
          });
    }

    function openDetailModal(orderId) {
      const modalContainer = document.getElementById('modalContainer');
      modalContainer.innerHTML = '<div class="text-center p-5"><div class="spinner-border text-info" role="status"></div></div>';
      fetch(`/admin/orders/${orderId}/details`)
        .then(res => res.text())
        .then(html => {
            modalContainer.innerHTML = html;
            new bootstrap.Modal(document.getElementById('orderDetailModal')).show();
        });
    }

    function changeStatus(id, status) {
      Swal.fire({
          title: 'Xác nhận?',
          text: `Chuyển sang ${status}?`,
          icon: 'question',
          showCancelButton: true,
          confirmButtonText: 'Đồng ý'
      }).then((result) => {
          if (result.isConfirmed) {
              fetch(`/admin/orders/${id}/status?status=${status}`, { method: 'POST' })
              .then(res => res.json())
              .then(data => {
                  if(data.status === 'success') getRevenueStats();
              });
          }
      });
    }

    // Load tất cả khi vừa mở trang (vì ô date đang trống)
    document.addEventListener('DOMContentLoaded', getRevenueStats);
</script>
</body>
</html>
