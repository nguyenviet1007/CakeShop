<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#667eea,#764ba2);
        }

        .register-container{
            background:rgba(255,255,255,0.15);
            backdrop-filter:blur(15px);
            padding:35px;
            border-radius:15px;
            width:420px;
            color:white;
            box-shadow:0 10px 30px rgba(0,0,0,0.25);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:12px;
            margin-top:10px;
            border:none;
            border-radius:8px;
            outline:none;
        }

        input:focus{
            box-shadow:0 0 5px white;
        }

        .input-error{
            border:2px solid #ff6b6b !important;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:15px;
            border:none;
            border-radius:8px;
            background:white;
            color:#764ba2;
            font-weight:600;
            cursor:pointer;
            transition:.3s;
        }

        button:hover{
            transform:scale(1.03);
        }

        .error{
            color:#ffb3b3;
            font-size:13px;
            margin-top:3px;
        }

        .server-message{
            background:rgba(255,255,255,0.2);
            border:1px solid rgba(255,255,255,0.35);
            color:#fff;
            padding:10px 12px;
            border-radius:8px;
            margin-bottom:15px;
            font-size:14px;
        }

        .server-error{
            background:rgba(255,0,0,0.18);
            border:1px solid rgba(255,180,180,0.5);
            color:#ffd6d6;
        }

        .server-success{
            background:rgba(0,255,120,0.15);
            border:1px solid rgba(180,255,210,0.4);
            color:#d8ffe8;
        }

        label{
            margin-top:8px;
            display:block;
        }

        .login-link{
            text-align:center;
            margin-top:15px;
            font-size:14px;
        }

        .login-link a{
            color:white;
            font-weight:600;
            text-decoration:none;
        }

        .login-link a:hover{
            text-decoration:underline;
        }
    </style>
</head>

<body>

<div class="register-container">

    <h2>Create Account üöÄ</h2>

    <!-- SERVER MESSAGE -->
    <div th:if="${usernameExists}" class="server-message server-error">
        ‚ùå Username ƒë√£ t·ªìn t·∫°i
    </div>

    <div th:if="${emailExists}" class="server-message server-error">
        ‚ùå Email ƒë√£ t·ªìn t·∫°i
    </div>

    <div th:if="${registerSuccess}" class="server-message server-success">
        ‚úÖ ƒêƒÉng k√Ω th√Ýnh c√¥ng, h√£y ƒëƒÉng nh·∫≠p
    </div>

    <form th:action="@{/register}"
          method="post"
          th:object="${user}"
          onsubmit="return validateForm()">

        <label>Name</label>
        <input type="text" th:field="*{name}" id="name">
        <div id="nameError" class="error"></div>

        <label>Email</label>
        <input type="email" th:field="*{email}" id="email">
        <div id="emailError" class="error"></div>

        <label>Phone</label>
        <input type="text" th:field="*{phone}" id="phone">
        <div id="phoneError" class="error"></div>

        <label>Address</label>
        <input type="text" th:field="*{address}" id="address">
        <div id="addressError" class="error"></div>

        <label>Username</label>
        <input type="text" th:field="*{username}" id="username">
        <div id="usernameError" class="error"></div>

        <label>Password</label>
        <input type="password" th:field="*{password}" id="password">
        <div id="passwordError" class="error"></div>

        <button type="submit">Register</button>
    </form>

    <div class="login-link">
        Already have an account? <a th:href="@{/login}">Login</a>
    </div>

</div>

<script>
    function validateForm(){

        let valid = true;

        let name = document.getElementById("name");
        let email = document.getElementById("email");
        let phone = document.getElementById("phone");
        let address = document.getElementById("address");
        let username = document.getElementById("username");
        let password = document.getElementById("password");

        let fields = [name, email, phone, address, username, password];
        fields.forEach(f => f.classList.remove("input-error"));

        // clear l·ªói
        document.querySelectorAll(".error").forEach(e => e.innerText = "");

        // NAME
        if(name.value.trim().length < 2){
            document.getElementById("nameError").innerText = "T√™n ph·∫£i >= 2 k√Ω t·ª±";
            name.classList.add("input-error");
            valid = false;
        }

        // EMAIL
        let emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if(email.value !== "" && !emailPattern.test(email.value)){
            document.getElementById("emailError").innerText = "Email kh√¥ng h·ª£p l·ªá";
            email.classList.add("input-error");
            valid = false;
        }

        // PHONE
        let phonePattern = /^(0|\+84)[0-9]{9}$/;
        if(phone.value !== "" && !phonePattern.test(phone.value)){
            document.getElementById("phoneError").innerText = "SƒêT kh√¥ng h·ª£p l·ªá";
            phone.classList.add("input-error");
            valid = false;
        }

        // ADDRESS
        if(address.value.trim().length < 10){
            document.getElementById("addressError").innerText = "ƒê·ªãa ch·ªâ ph·∫£i tr√™n 10 k√Ω t·ª±";
            address.classList.add("input-error");
            valid = false;
        }

        // USERNAME
        if(username.value.trim().length < 4){
            document.getElementById("usernameError").innerText = "Username >= 4 k√Ω t·ª±";
            username.classList.add("input-error");
            valid = false;
        }

        // PASSWORD
        if(password.value.length < 6){
            document.getElementById("passwordError").innerText = "Password >= 6 k√Ω t·ª±";
            password.classList.add("input-error");
            valid = false;
        }

        return valid;
    }
</script>

</body>
</html>
