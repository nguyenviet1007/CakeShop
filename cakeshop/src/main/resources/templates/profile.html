<html xmlns:th="http://www.thymeleaf.org">
<div th:replace="~{fragments/account-layout :: accountLayout(~{::content})}">
    <div th:fragment="content">
        <h2>Hồ Sơ Của Tôi</h2>
        <form class="profile-form"
              th:action="@{/profile/update}"
              th:object="${customer}"
              method="post">
            <div class="form-group">
                <label>Tên đăng nhập</label>
                <input type="text" th:value="${customer.username}" readonly>
            </div>
            <div class="form-group">
                <label>Tên</label>
                <input type="text" th:value="${customer.name}">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="text" th:value="${customer.email}">
            </div>
            <div class="form-group">
                <label>Số điện thoại</label>
                <input type="text" th:value="${customer.phone}">
            </div>
            <div class="form-group">
                <label>Địa chỉ</label>
                <input type="text" th:value="${customer.address}">
            </div>
            <button class="save-btn" type="submit">Lưu</button>
        </form>
    </div>
</div>

</html>
