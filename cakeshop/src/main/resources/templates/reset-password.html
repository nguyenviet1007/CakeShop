<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reset Password</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            background:linear-gradient(135deg,#eef2ff,#f8fafc);
        }

        .container{
            width:420px;
            margin:100px auto;
            background:white;
            padding:35px 30px;
            border-radius:18px;
            box-shadow:0 15px 35px rgba(0,0,0,0.08);
            text-align:center;
            transition:0.3s;
        }

        .container:hover{
            transform:translateY(-4px);
        }

        h2{
            margin-bottom:20px;
            color:#111827;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border-radius:10px;
            border:1px solid #e5e7eb;
            outline:none;
            transition:0.3s;
        }

        input:focus{
            border-color:#6366f1;
            box-shadow:0 0 0 2px rgba(99,102,241,0.2);
        }

        /* ERROR INPUT */
        .input-error{
            border-color:#dc2626 !important;
            box-shadow:0 0 0 2px rgba(220,38,38,0.2);
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:10px;
            background:linear-gradient(135deg,#4f46e5,#6366f1);
            color:white;
            font-weight:500;
            cursor:pointer;
            margin-top:10px;
        }

        button:hover{
            opacity:0.9;
        }

        .alert{
            padding:10px;
            border-radius:10px;
            margin-bottom:10px;
            font-size:14px;
        }

        .error{
            background:#fee2e2;
            color:#dc2626;
        }

        .success{
            background:#dcfce7;
            color:#16a34a;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>🔐 Đặt lại mật khẩu</h2>

    <!-- SERVER MESSAGE -->
    <div th:if="${error}" class="alert error">
        <span th:text="${error}"></span>
    </div>

    <div th:if="${success}" class="alert success">
        <span th:text="${success}"></span>
    </div>

    <form th:action="@{/reset-password}" method="post" onsubmit="return validatePassword()">

        <input type="hidden" name="token" th:value="${token}">

        <input type="password"
               id="password"
               name="password"
               placeholder="Mật khẩu mới"
               required>

        <input type="password"
               id="confirmPassword"
               name="confirmPassword"
               placeholder="Xác nhận mật khẩu"
               required>

        <button type="submit">
            🔄 Đổi mật khẩu
        </button>

    </form>

</div>

<!-- 🔥 VALIDATE JS -->
<script>
    function validatePassword() {
        const pass = document.getElementById("password");
        const confirm = document.getElementById("confirmPassword");

        // reset style
        pass.classList.remove("input-error");
        confirm.classList.remove("input-error");

        if (pass.value !== confirm.value) {
            alert("❌ Mật khẩu không trùng!");
            pass.classList.add("input-error");
            confirm.classList.add("input-error");
            return false;
        }

        if (pass.value.length < 6) {
            alert("❌ Mật khẩu phải >= 6 ký tự!");
            pass.classList.add("input-error");
            return false;
        }

        return true;
    }
</script>

</body>
</html>
