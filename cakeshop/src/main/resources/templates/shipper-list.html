<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Shipper Management</title>
    <meta charset="UTF-8">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background: #f5f7fa; }
        .card { border-radius: 20px; }
        .btn { border-radius: 10px; }

        .pagination .active .page-link {
            background: #4f46e5;
            border-color: #4f46e5;
        }
    </style>
</head>

<body>

<div class="container mt-5">
    <div class="card shadow-lg border-0">

        <!-- HEADER -->
        <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
            <a href="/admin/dashboard" class="btn btn-light btn-sm">⬅ Back</a>
            <h4 class="mb-0">🚚 Shipper Management</h4>

            <!-- 🔥 RIGHT BUTTON GROUP -->
            <div class="d-flex gap-2">
                <a href="/admin/shippers/fee" class="btn btn-info">
                    💰 Quản lý phí giao hàng
                </a>

                <a href="/admin/shippers/create" class="btn btn-warning">
                    + Add Shipper
                </a>
            </div>
        </div>

        <div class="card-body">

            <!-- ALERT -->
            <div th:if="${param.success}" class="alert alert-success text-center">
                ✅ Tạo shipper thành công!
            </div>

            <div th:if="${param.deleted}" class="alert alert-danger text-center">
                🗑️ Xóa shipper thành công!
            </div>

            <!-- 🔥 FILTER BOX -->
            <div class="card mb-4 border-0 shadow-sm">

                <div class="card-body">

                    <!-- TITLE -->
                    <h5 class="mb-3">🔍 Bộ lọc tìm kiếm</h5>

                    <form method="get" th:action="@{/admin/shippers}">
                        <div class="row">

                            <!-- SEARCH -->
                            <div class="col-md-5">
                                <label class="form-label">Tìm kiếm</label>
                                <input type="text"
                                       name="keyword"
                                       class="form-control"
                                       placeholder="Tên, username, SĐT..."
                                       th:value="${keyword}">
                            </div>

                            <!-- STATUS -->
                            <div class="col-md-3">
                                <label class="form-label">Trạng thái</label>
                                <select name="status" class="form-select">
                                    <option value="all" th:selected="${status == null or status == 'all'}">Tất cả</option>
                                    <option value="active" th:selected="${status == 'active'}">Đang hoạt động</option>
                                    <option value="inactive" th:selected="${status == 'inactive'}">Đã khóa</option>
                                </select>
                            </div>

                            <!-- SIZE -->
                            <div class="col-md-2">
                                <label class="form-label">Hiển thị</label>
                                <select name="size" class="form-select">
                                    <option value="5" th:selected="${size == 5}">5</option>
                                    <option value="10" th:selected="${size == 10}">10</option>
                                    <option value="20" th:selected="${size == 20}">20</option>
                                </select>
                            </div>

                            <!-- BUTTON -->
                            <div class="col-md-2 d-flex align-items-end">
                                <button class="btn btn-primary w-100">Lọc</button>
                            </div>

                        </div>
                    </form>

                </div>
            </div>

            <!-- TABLE -->
            <table class="table table-hover align-middle text-center">

                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Username</th>
                    <th>Phone</th>
                    <th>Address</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="s : ${shippers}">

                    <td th:text="${s.id}"></td>
                    <td th:text="${s.name}"></td>
                    <td th:text="${s.username}"></td>
                    <td th:text="${s.phone}"></td>
                    <td th:text="${s.address}"></td>

                    <td>
                        <span th:if="${s.active}" class="badge bg-success">Active</span>
                        <span th:if="${!s.active}" class="badge bg-secondary">Disabled</span>
                    </td>

                    <td>
                        <a th:href="@{'/admin/shippers/delete/' + ${s.id}}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Bạn có chắc muốn xóa shipper này?')">
                            Delete
                        </a>
                    </td>

                </tr>
                </tbody>
            </table>

            <!-- NO DATA -->
            <div class="text-center mt-3" th:if="${#lists.isEmpty(shippers)}">
                <p class="text-muted">📭 Không có dữ liệu</p>
            </div>

            <!-- 🔥 PAGINATION -->
            <nav class="mt-3" th:if="${totalPages > 0}">
                <ul class="pagination justify-content-center">

                    <!-- PREVIOUS -->
                    <li class="page-item"
                        th:classappend="${currentPage == 0} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/admin/shippers(
                               page=${currentPage - 1},
                               size=${size},
                               keyword=${keyword},
                               status=${status}
                           )}">
                            Previous
                        </a>
                    </li>

                    <!-- PAGE -->
                    <li class="page-item"
                        th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                        th:classappend="${i == currentPage} ? 'active'">

                        <a class="page-link"
                           th:href="@{/admin/shippers(
                               page=${i},
                               size=${size},
                               keyword=${keyword},
                               status=${status}
                           )}"
                           th:text="${i + 1}">
                        </a>
                    </li>

                    <!-- NEXT -->
                    <li class="page-item"
                        th:classappend="${currentPage == totalPages - 1} ? 'disabled'">

                        <a class="page-link"
                           th:href="@{/admin/shippers(
                               page=${currentPage + 1},
                               size=${size},
                               keyword=${keyword},
                               status=${status}
                           )}">
                            Next
                        </a>
                    </li>

                </ul>
            </nav>

        </div>
    </div>
</div>

<!-- AUTO HIDE ALERT -->
<script>
    setTimeout(() => {
        document.querySelectorAll(".alert").forEach(a => {
            a.style.transition = "0.5s";
            a.style.opacity = "0";
            setTimeout(() => a.remove(), 500);
        });
    }, 3000);
</script>

</body>
</html>
